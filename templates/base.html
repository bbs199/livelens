<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LiveLens{% endblock %} — cminsights.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #060e1a;
      --bg2:        #080f1e;
      --bg3:        #0d1b2a;
      --bg4:        #0a1628;
      --border:     #0e2035;
      --border2:    #1a3450;
      --text:       #e0eeff;
      --text2:      #8899aa;
      --text3:      #445566;
      --accent:     #00d4aa;
      --accent2:    #0088cc;
      --warn:       #ffd54f;
      --danger:     #ef5350;
      --grade-a:    #00d4aa;
      --grade-b:    #4fc3f7;
      --grade-c:    #ffd54f;
      --grade-d:    #ff8a65;
      --grade-f:    #ef5350;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }
    .logo-mark {
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 900;
      font-size: 15px;
      color: #000;
    }
    .logo-name {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.15em;
      color: var(--text);
    }
    .logo-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .nav a {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      transition: all 0.15s;
      font-weight: 500;
    }
    .nav a:hover { background: var(--bg3); color: var(--text); }
    .nav .cta {
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    .nav .cta:hover { background: #00f0c0; color: #000; }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    /* ── TYPOGRAPHY ── */
    h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
      margin-bottom: 6px;
    }
    h2 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h3 {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .subtitle {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* ── CARDS ── */
    .card {
      background: var(--bg4);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-accent {
      width: 3px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── FORM ELEMENTS ── */
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field-hint {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 6px;
      font-style: italic;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text3); }
    select option { background: var(--bg3); }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 0;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .checkbox-label span {
      font-size: 13px;
      color: var(--text);
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #00f0c0; }
    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-secondary:hover { background: var(--bg2); }

    /* ── GRADE BADGE ── */
    .grade-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px; height: 44px;
      border-radius: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 900;
      font-size: 20px;
    }
    .grade-A { background: #003d3020; color: var(--grade-a); border: 2px solid var(--grade-a); }
    .grade-B { background: #0a2a3d20; color: var(--grade-b); border: 2px solid var(--grade-b); }
    .grade-C { background: #3d300020; color: var(--grade-c); border: 2px solid var(--grade-c); }
    .grade-D { background: #3d1a0020; color: var(--grade-d); border: 2px solid var(--grade-d); }
    .grade-F { background: #3d0a0a20; color: var(--grade-f); border: 2px solid var(--grade-f); }

    /* ── SCORE BAR ── */
    .score-bar-wrap { height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-top: 6px; }
    .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    /* ── RED FLAGS ── */
    .flag {
      display: flex; gap: 12px; padding: 12px 14px; border-radius: 7px;
      margin-bottom: 8px; font-size: 13px; line-height: 1.5;
    }
    .flag-CRITICAL { background: #2a080820; border: 1px solid #ef535040; color: #ffaaaa; }
    .flag-WARNING  { background: #2a220020; border: 1px solid #ffd54f40; color: #ffe082; }
    .flag-NOTE     { background: #0d1b2a;   border: 1px solid var(--border2); color: var(--text2); }
    .flag-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      white-space: nowrap; padding-top: 2px;
    }
    .flag-CRITICAL .flag-label { color: var(--danger); }
    .flag-WARNING  .flag-label { color: var(--warn); }
    .flag-NOTE     .flag-label { color: var(--text3); }

    /* ── CONFIDENCE BADGE ── */
    .conf-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    }
    .conf-HIGH   { background: #00d4aa20; color: var(--accent); border: 1px solid #00d4aa40; }
    .conf-MEDIUM { background: #ffd54f20; color: var(--warn);   border: 1px solid #ffd54f40; }
    .conf-LOW    { background: #ef535020; color: var(--danger); border: 1px solid #ef535040; }

    /* ── TABLE ── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      padding: 10px 12px; text-align: left;
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
      color: var(--text2); text-transform: uppercase;
      border-bottom: 1px solid var(--border2);
    }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:nth-child(even) td { background: #0a162820; }

    /* ── FORM GRID ── */
    .form-grid   { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 16px; }
    .col-span-2  { grid-column: span 2; }

    /* ── PROJECT LIST ── */
    .project-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-radius: 8px;
      background: var(--bg4); border: 1px solid var(--border);
      margin-bottom: 8px; text-decoration: none; color: var(--text);
      transition: border-color 0.15s;
    }
    .project-row:hover { border-color: var(--border2); }
    .project-ticker {
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 700; font-size: 15px; color: var(--text);
    }
    .project-name  { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .project-meta  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text3); }

    /* ── SCORE CIRCLE ── */
    .score-circle {
      width: 90px; height: 90px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 3px solid; flex-shrink: 0;
    }
    .score-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 28px; font-weight: 900; line-height: 1;
    }
    .score-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em; opacity: 0.7; margin-top: 2px;
    }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 32px 0 24px;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── DISCLAIMER ── */
    .disclaimer {
      padding: 16px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 7px; font-size: 12px; color: var(--text3);
      line-height: 1.7; margin-top: 24px;
    }
    .disclaimer strong { color: var(--text2); }

    /* ── STEP INDICATOR ── */
    .steps { display: flex; gap: 6px; margin-bottom: 28px; overflow-x: auto; padding-bottom: 4px; }
    .step {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--bg4); color: var(--text2); transition: all 0.15s;
    }
    .step.active { border-color: var(--accent); color: var(--accent); background: #00d4aa10; }
    .step.done   { border-color: var(--border2); color: var(--text3); }
    .step-num {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; background: var(--bg3); flex-shrink: 0;
    }
    .step.active .step-num { background: var(--accent); color: #000; }

    @media (max-width: 768px) {
      .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
      .col-span-2 { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-mark">L</div>
        <div>
          <div class="logo-name">BEAST · LIVELENS</div>
          <div class="logo-sub">LiveLens · cminsights.ai</div>
        </div>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/search">Search</a>
        <a href="/analyse" style="color:var(--text2); padding:6px 14px; border-radius:6px; font-size:13px; text-decoration:none; font-weight:500;">Manual Form</a>
        <a href="/scrape" class="cta">+ Analyse Token</a>
        <a href="/buy" id="nav-credits"
           style="color:var(--text2); padding:6px 14px; border-radius:6px; font-size:13px; text-decoration:none; font-weight:500; display:none;">
          <span id="nav-credit-balance">0</span> credits
        </a>
        <button id="wallet-btn" onclick="toggleWallet()"
          style="background:var(--bg3); color:var(--text2); border:1px solid var(--border2);
                 padding:6px 14px; border-radius:6px; font-size:13px; cursor:pointer;
                 font-family:inherit; font-weight:500;">
          Connect Wallet
        </button>
      </nav>
    </div>
  </header>

  <main class="main">
    {% block content %}{% endblock %}
  </main>

<script>
async function toggleWallet() {
  const btn = document.getElementById("wallet-btn");
  if (btn.dataset.connected === "true") {
    await fetch("/disconnect", {method:"POST"});
    btn.textContent = "Connect Wallet";
    btn.dataset.connected = "false";
    document.getElementById("nav-credits").style.display = "none";
    return;
  }
  if (!window.ethereum) {
    alert("No wallet detected. Install MetaMask or Coinbase Wallet.");
    return;
  }
  try {
    const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
    const address = accounts[0];
    const resp = await fetch("/connect", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({address})
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    btn.textContent = address.slice(0,6) + "..." + address.slice(-4);
    btn.dataset.connected = "true";
    document.getElementById("nav-credit-balance").textContent = data.balance;
    document.getElementById("nav-credits").style.display = "inline-flex";
  } catch(e) {
    alert("Wallet connection failed: " + e.message);
  }
}

// On page load, check if already connected
fetch("/api/balance").then(r=>r.json()).then(data=>{
  if (data.connected) {
    const btn = document.getElementById("wallet-btn");
    btn.dataset.connected = "true";
    document.getElementById("nav-credit-balance").textContent = data.balance;
    document.getElementById("nav-credits").style.display = "inline-flex";
  }
});
</script>
</body>
</html>
